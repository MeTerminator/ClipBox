<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="documentTitle">Clip 剪贴板 | ClipBox</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="clip.css">
</head>

<body>
    <button id="langToggle" class="lang-toggle">Eng</button>
    <button id="themeToggle" class="theme-toggle" aria-label="切换主题" data-i18n-aria-label="themeToggleLabel">🌙</button>
    <div class="page-header">
        <h1 data-i18n="headerTitle">📦 Clip 剪贴板</h1>
        <p class="subtitle" data-i18n="headerSubtitle">轻松在多端间传文本、链接和文件</p>
        <h4><a href="/" data-i18n="backHome">返回主页</a></h4>
    </div>
    <div class="tab-container">
        <div class="tabs">
            <button class="tab-button active" data-tab="file" data-i18n="fileUploadTab">文件上传</button>
            <button class="tab-button" data-tab="text" data-i18n="textClipboardTab">文本剪贴板</button>
            <button class="tab-button" data-tab="link" data-i18n="shortLinkTab">短链接</button>
        </div>

        <div id="file-tab" class="tab-content active">
            <form id="uploadFileForm" action="/api/clip/upload" method="POST" enctype="multipart/form-data">
                <label for="file" data-i18n="selectFileLabel">选择文件</label>
                <div class="dropzone" id="dropzone">
                    <div class="dz-instruction" data-i18n="dropzoneInstruction">拖拽文件到此处，或点击选择</div>
                    <input type="file" id="file" name="file" required />
                </div>

                <div class="file-info" id="fileInfo">
                    <p data-i18n-prefix="fileName">文件名: <span id="fileName"></span></p>
                    <p data-i18n-prefix="fileSize">文件大小: <span id="fileSize"></span></p>
                    <p data-i18n-prefix="fileHash">SHA-256: <span id="fileHash"></span>
                        <button type="button" id="copyHashBtn" class="btn-outline small" data-i18n="copy">复制</button>
                    </p>
                </div>

                <label for="fileCount" data-i18n="maxDownloadsLabel">最大下载次数</label>
                <input type="number" id="fileCount" name="count" value="100000" required />

                <label for="fileExpire" data-i18n="expireTimeLabel">过期时间</label>
                <div class="expire-row">
                    <input type="number" id="fileExpire" name="expire" value="7" min="1" required />
                    <select id="fileExpireUnit" class="expire-unit" aria-label="过期时间单位">
                        <option value="d" selected data-i18n="days">天</option>
                        <option value="w" data-i18n="weeks">周</option>
                        <option value="m" data-i18n="months">月</option>
                    </select>
                </div>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>

                <button type="submit" data-i18n="uploadFileButton">上传文件</button>
            </form>
        </div>

        <div id="text-tab" class="tab-content">
            <form id="createClipForm" action="/api/clip/create" method="POST">
                <label for="content" data-i18n="textContentLabel">文本内容</label>
                <textarea id="content" name="content" rows="4" required></textarea>

                <label for="count" data-i18n="maxAccessLabel">最大访问次数</label>
                <input type="number" id="count" name="count" value="100000" required />

                <label for="expire" data-i18n="expireTimeLabel">过期时间</label>
                <div class="expire-row">
                    <input type="number" id="expire" name="expire" value="7" min="1" required />
                    <select id="expireUnit" class="expire-unit" aria-label="过期时间单位">
                        <option value="d" selected data-i18n="days">天</option>
                        <option value="w" data-i18n="weeks">周</option>
                        <option value="m" data-i18n="months">月</option>
                    </select>
                </div>

                <button type="submit" data-i18n="createButton">创建</button>
            </form>
        </div>

        <div id="link-tab" class="tab-content">
            <form id="createLinkForm" action="/api/clip/create" method="POST">
                <label for="linkUrl" data-i18n="linkAddressLabel">链接地址</label>
                <input type="url" id="linkUrl" name="content" placeholder="https://example.com" required />

                <label for="linkCount" data-i18n="maxAccessLabel">最大访问次数</label>
                <input type="number" id="linkCount" name="count" value="100000" required />

                <label for="linkExpire" data-i18n="expireTimeLabel">过期时间</label>
                <div class="expire-row">
                    <input type="number" id="linkExpire" name="expire" value="7" min="1" required />
                    <select id="linkExpireUnit" class="expire-unit" aria-label="过期时间单位">
                        <option value="d" selected data-i18n="days">天</option>
                        <option value="w" data-i18n="weeks">周</option>
                        <option value="m" data-i18n="months">月</option>
                    </select>
                </div>

                <input type="hidden" name="link" value="yes" />

                <button type="submit" data-i18n="createShortLinkButton">创建短链接</button>
            </form>
        </div>


    </div>

    <div class="result code-box" id="result">
        <div class="code-box-header">
            <span data-i18n="resultHeader">提示</span>
            <button id="copyCodeBtn" type="button" class="btn-outline small" data-i18n="copyCodeButton">复制提取码</button>
        </div>
        <div class="code-box-body" id="resultBody"></div>
    </div>

    <div class="history" id="history">
        <div class="history-header">
            <h2 data-i18n="historyHeader">历史记录</h2>
            <button id="clearHistoryBtn" type="button" class="btn-danger" data-i18n="clearHistoryButton">清空历史</button>
        </div>
        <ul id="historyList"></ul>
    </div>

    <script src="i18n-clip.js"></script>
    <script src="crypto-js.min.js"></script>
    <script src="clip.js"></script>
</body>

</html>
